<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cattle Call</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.4);
  --yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.12);--yellow-border:rgba(251,191,36,.4);
  --bg:#050505;--surface:#0e0e0e;--surface2:#111;--border:#1e1e1e;
  --text:#ddd;--muted:#555;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:40px}
.brand-mark{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.brand-name{font-size:36px;font-weight:700;color:var(--yellow);letter-spacing:-1px}
.brand-sub{font-size:13px;color:var(--muted);margin-top:6px;text-align:center}
.question{font-size:14px;color:var(--text);margin-bottom:18px;text-align:center;font-weight:500}
.choices{display:flex;flex-direction:column;gap:12px;width:100%}
.choice{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:16px;transition:all .15s;font-family:'DM Sans',sans-serif}
.choice:hover{border-color:#3a3a3a;background:#141414}
.choice:active{transform:scale(.98)}
.choice .icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.choice.buyer .icon{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green)}
.choice.host .icon{background:var(--yellow-dim);border:1px solid var(--yellow-border);color:var(--yellow)}
.choice .txt{display:flex;flex-direction:column;gap:2px;text-align:left}
.choice .ttl{font-size:16px;font-weight:600;color:var(--text)}
.choice .desc{font-size:12px;color:var(--muted)}
.choice .arr{margin-left:auto;color:var(--muted);font-size:18px}
.foot{margin-top:32px;font-size:10px;color:#333;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-mark">Cattle Call</div>
    <div class="brand-name">Remate en vivo</div>
    <div class="brand-sub">Plataforma de subastas ganaderas</div>
  </div>

  <div class="question">¿Cómo vas a participar?</div>

  <div class="choices">
    <a href="caller.html" class="choice buyer">
      <div class="icon">🤚</div>
      <div class="txt">
        <div class="ttl">Soy comprador</div>
        <div class="desc">Ingresar a un remate con código</div>
      </div>
      <div class="arr">›</div>
    </a>

    <a href="host.html" class="choice host">
      <div class="icon">🎙️</div>
      <div class="txt">
        <div class="ttl">Soy martillero</div>
        <div class="desc">Crear y conducir un remate</div>
      </div>
      <div class="arr">›</div>
    </a>
  </div>

  <div class="foot">v0.1</div>
</div>
</body>
</html>
